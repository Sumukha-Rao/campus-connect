<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RVCE Connect – A Campus Forum App</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0f172a">
  <link rel="icon" href="/icons/icon-192.png">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
  <script src="/js/theme.js"></script>
</head>
<body class="login-bg">
  <button class="theme-toggle-float" data-theme-toggle type="button" title="Toggle dark mode" aria-label="Toggle dark mode">
    <i class="bi bi-moon-stars-fill"></i>
  </button>
  <main class="container d-flex align-items-center justify-content-center min-vh-100 py-4">
    <div class="card shadow-lg login-card border-0">
      <div class="card-body p-4 p-md-5">
        <div class="text-center mb-4">
          <div class="brand-circle mx-auto mb-3">
            <i class="bi bi-mortarboard-fill"></i>
          </div>
          <h1 class="h3 fw-800 mb-1 text-gradient">RVCE Connect – A Campus Forum App</h1>
        </div>

        <!-- Tabs -->
        <ul class="nav nav-pills nav-justified mb-4" id="authTabs" role="tablist">
          <li class="nav-item" role="presentation">
            <button class="nav-link active fw-semibold" id="tab-login" data-bs-toggle="pill" data-bs-target="#pane-login" type="button" role="tab">Sign In</button>
          </li>
          <li class="nav-item" role="presentation">
            <button class="nav-link fw-semibold" id="tab-register" data-bs-toggle="pill" data-bs-target="#pane-register" type="button" role="tab">Create Account</button>
          </li>
        </ul>

        <div class="tab-content" id="authTabContent">
          <!-- Login Pane -->
          <div class="tab-pane fade show active" id="pane-login" role="tabpanel">
            <form id="loginForm" novalidate>
              <div class="mb-3">
                <label for="username" class="form-label small fw-semibold">Username</label>
                <div class="input-group">
                  <span class="input-group-text bg-white"><i class="bi bi-person"></i></span>
                  <input type="text" class="form-control" id="username" name="username" required autocomplete="username">
                </div>
              </div>

              <div class="mb-3">
                <label for="password" class="form-label small fw-semibold">Password</label>
                <div class="input-group">
                  <span class="input-group-text bg-white"><i class="bi bi-lock"></i></span>
                  <input type="password" class="form-control" id="password" name="password" required autocomplete="current-password">
                  <button class="btn btn-outline-secondary toggle-pw" type="button" tabindex="-1">
                    <i class="bi bi-eye"></i>
                  </button>
                </div>
              </div>

              <div id="loginError" class="alert alert-danger small d-none mb-3"></div>

              <button class="btn btn-primary w-100 fw-semibold" type="submit" id="loginBtn">
                <span id="loginBtnText">Sign in</span>
                <span class="spinner-border spinner-border-sm ms-2 d-none" id="loginBtnSpinner" role="status"></span>
              </button>
            </form>
          </div>

          <!-- Register Pane -->
          <div class="tab-pane fade" id="pane-register" role="tabpanel">
            <form id="registerForm" novalidate>
              <div class="row g-2 mb-2">
                <div class="col-6">
                  <label class="form-label small fw-semibold">Full Name</label>
                  <input type="text" class="form-control" id="reg_full_name" required>
                </div>
                <div class="col-6">
                  <label class="form-label small fw-semibold">Username</label>
                  <input type="text" class="form-control" id="reg_username" required>
                </div>
              </div>

              <div class="mb-2">
                <label class="form-label small fw-semibold">College Email (@rvce.edu.in)</label>
                <input type="email" class="form-control" id="reg_email" required>
              </div>

              <div class="mb-2">
                <label class="form-label small fw-semibold">Department</label>
                <select class="form-select" id="reg_department" required>
                  <option value="">Loading...</option>
                </select>
              </div>

              <div class="mb-3">
                <label class="form-label small fw-semibold">Password</label>
                <div class="input-group">
                  <span class="input-group-text bg-white"><i class="bi bi-lock"></i></span>
                  <input type="password" class="form-control" id="reg_password" required>
                  <button class="btn btn-outline-secondary toggle-pw" type="button" tabindex="-1">
                    <i class="bi bi-eye"></i>
                  </button>
                </div>
              </div>

              <div id="regError" class="alert alert-danger small d-none mb-3"></div>
              <div id="regSuccess" class="alert alert-success small d-none mb-3"></div>

              <button class="btn btn-success w-100 fw-semibold" type="submit" id="regBtn">
                <span id="regBtnText">Create Account</span>
                <span class="spinner-border spinner-border-sm ms-2 d-none" id="regBtnSpinner" role="status"></span>
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/sw-register.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/login.js"></script>
</body>
</html>
