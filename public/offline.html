<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RVCE Connect – A Campus Forum App</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0f7a4d">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
  <script src="/js/theme.js"></script>
</head>
<body>
  <button class="theme-toggle-float" data-theme-toggle type="button" title="Toggle dark mode" aria-label="Toggle dark mode">
    <i class="bi bi-moon-stars-fill"></i>
  </button>
  <div class="container py-5 text-center">
    <div class="display-1 mb-3">📡</div>
    <h1 class="h3 mb-3">You're offline</h1>
    <p class="text-muted">Don't worry — the posts you've already loaded are still available.</p>
    <a href="/" class="btn btn-primary mt-3">Try again</a>
  </div>
</body>
</html>
